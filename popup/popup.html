<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabaNada</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <img src="../icons/icon48.png" alt="HabaNada" class="logo-icon">
        <h1 class="logo-text">HabaNada</h1>
      </div>
      <span class="version">v1.0.0</span>
    </header>

    <div class="card">
      <div class="domain-row">
        <span class="domain-label" id="lbl-current-domain">Current domain</span>
        <span id="domain-name" class="domain-name">loading...</span>
      </div>

      <div class="toggle-row">
        <span class="toggle-label" id="lbl-shield-active">Block ads</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-enabled" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <span class="toggle-label" id="lbl-anti-clickbait">Rewrite clickbait</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-clickbait" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="status-row">
        <div class="ai-status">
          <span id="ai-indicator" class="indicator indicator--offline"></span>
          <span id="ai-label" class="status-label">AI: Checking...</span>
        </div>
      </div>
    </div>

    <div class="card stats-card">
      <h2 class="card-title" id="lbl-on-this-page">On this page</h2>
      <div class="stats-grid">
        <div class="stat">
          <span id="stat-blocked" class="stat-value">0</span>
          <span class="stat-label" id="lbl-ads-hidden">Ads hidden</span>
        </div>
        <div class="stat">
          <span id="stat-rewritten" class="stat-value">0</span>
          <span class="stat-label" id="lbl-rewritten">Rewritten</span>
        </div>
      </div>
      <div class="total-stats-row">
        <span id="lbl-total-hidden">Total hidden: <strong id="total-blocked">0</strong></span>
        <span id="lbl-total-rewritten">Total rewritten: <strong id="total-rewritten">0</strong></span>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-text" id="lbl-footer">Powered by Gemini Nano</div>
      <div class="github-container">
        <a href="https://github.com/Almanex/HabaNada" target="_blank" class="github-link">
          <svg class="github-icon" viewBox="0 0 16 16" width="12" height="12" fill="currentColor">
            <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.35 3.12.88.01.47.01.84.01.95 0 .22-.16.46-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8z"/>
          </svg>
          <span>GitHub</span>
        </a>
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
